<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="icon" type="image/svg+xml" href="image/logo-white.svg" />
  <link rel="apple-touch-icon" href="image/logo-white.svg" />
  <title>Memorit - 무료 부고장 (간편 부고장)</title>
  <meta name="description" content="간편하게 만들고 공유하는 온라인 부고장. 영정사진, 장례식장 정보, 추모 메시지까지 한 곳에서 전달하세요." />

  <!-- Open Graph (카톡 외 메신저·SNS 미리보기) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Memorit" />
  <meta property="og:title" content="Memorit - 간편 부고장" />
  <meta property="og:description" content="삼가 고인의 명복을 빕니다. 부고장 정보와 장례 일정을 확인하세요." />
  <meta property="og:image" content="https://placehold.co/1200x630/f3ede4/333333.png?text=%E2%9A%98+Memorit" />
  <meta property="og:url" content="https://app.memorit.kr/" />
  <meta property="og:locale" content="ko_KR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Memorit - 간편 부고장" />
  <meta name="twitter:description" content="삼가 고인의 명복을 빕니다. 부고장 정보와 장례 일정을 확인하세요." />
  <meta name="twitter:image" content="https://placehold.co/1200x630/f3ede4/333333.png?text=%E2%9A%98+Memorit" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app" class="app">
    <!-- Header -->
    <header class="header" id="header">
      <button class="header__back" id="headerBack" aria-label="뒤로가기" hidden>‹</button>
      <h1 class="header__title" id="headerTitle">
        <img class="logo-mark" src="image/logo.svg" alt="Memorit" />
        Memorit
      </h1>
      <button class="header__action" id="headerSaveDraft" hidden>임시저장</button>
      <button class="header__menu" id="headerMenu" aria-label="메뉴">≡</button>
    </header>

    <!-- Views containe -->
    <main class="view" id="view"></main>

    <!-- Slide menu -->
    <aside class="slide-menu" id="slideMenu" aria-hidden="true">
      <div class="slide-menu__panel">
        <button class="slide-menu__close" id="slideMenuClose" aria-label="닫기">×</button>
        <nav class="slide-menu__nav">
          <button class="slide-menu__item" data-action="edit-obituary">부고장 수정하기</button>
          <button class="slide-menu__item" data-action="my-obituaries">나의 부고장 관리</button>
        </nav>
        <div class="slide-menu__footer">
          <button class="slide-menu__link" data-action="privacy">개인정보처리방침</button>
          <button class="slide-menu__link" data-action="terms">서비스 이용약관</button>
        </div>
      </div>
      <div class="slide-menu__backdrop" id="slideMenuBackdrop"></div>
    </aside>

    <!-- Bottom-sheet container -->
    <div class="bottom-sheet" id="bottomSheet" aria-hidden="true">
      <div class="bottom-sheet__backdrop" id="bottomSheetBackdrop"></div>
      <div class="bottom-sheet__panel" id="bottomSheetPanel"></div>
    </div>

    <!-- Modal container -->
    <div class="modal" id="modal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div class="modal__panel" id="modalPanel"></div>
    </div>

    <!-- Full popup -->
    <div class="full-popup" id="fullPopup" aria-hidden="true">
      <div class="full-popup__panel" id="fullPopupPanel"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" aria-live="polite"></div>
  </div>

  <!-- Kakao Maps JavaScript SDK (with services library for geocoding) -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=bde79058e624bc54d4dcdedc60406615&libraries=services&autoload=false"></script>
  <!-- Daum Postcode API (주소 검색) -->
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <!-- Kakao JS SDK (공유하기) -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" integrity="sha384-DKYJZ8NLiK8MN4/C5P2dtSmLQ4KwPaoqAfyA/DfmEc1VDxu4yyC7wy6K1Hs90nka" crossorigin="anonymous"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
